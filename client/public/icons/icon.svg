<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Compass circle -->
  <circle cx="256" cy="280" r="160" stroke="#1a2332" stroke-width="40" fill="none"/>
  <!-- Compass rose - 8 points -->
  <g transform="translate(256,280)">
    <!-- North -->
    <polygon points="0,-120 -15,-40 0,-50 15,-40" fill="#1a2332"/>
    <!-- South -->
    <polygon points="0,120 -15,40 0,50 15,40" fill="#1a2332"/>
    <!-- East -->
    <polygon points="120,0 40,-15 50,0 40,15" fill="#1a2332"/>
    <!-- West -->
    <polygon points="-120,0 -40,-15 -50,0 -40,15" fill="#1a2332"/>
    <!-- NE -->
    <polygon points="85,-85 30,-20 35,-30" fill="#1a2332"/>
    <!-- NW -->
    <polygon points="-85,-85 -30,-20 -35,-30" fill="#1a2332"/>
    <!-- SE -->
    <polygon points="85,85 30,20 35,30" fill="#1a2332"/>
    <!-- SW -->
    <polygon points="-85,85 -30,20 -35,30" fill="#1a2332"/>
  </g>
  <!-- Blue arrow -->
  <g transform="translate(256,280)">
    <polygon points="40,-200 100,-120 60,-100 80,-60 20,-130 40,-110" fill="#4a9bd9"/>
    <polygon points="20,-130 80,-60 40,-20" fill="#3a8ac4"/>
  </g>
  <!-- Text MARSHRUTIZATOR -->
  <text x="256" y="480" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="60" fill="#1a2332" letter-spacing="4">MARSHRUTIZATOR</text>
</svg>
