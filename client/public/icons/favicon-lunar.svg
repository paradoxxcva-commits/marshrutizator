<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="moonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8c4e0"/>
      <stop offset="100%" style="stop-color:#6b9fd4"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8e0"/>
      <stop offset="100%" style="stop-color:#4a9bd9"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Moonlit background circle -->
  <circle cx="256" cy="256" r="180" stroke="url(#moonGlow)" stroke-width="40" fill="none" filter="url(#glow)" opacity="0.7"/>
  <!-- Compass rose - 8 points (silver/moonlit) -->
  <g transform="translate(256,256)">
    <polygon points="0,-130 -16,-42 0,-54 16,-42" fill="#8fafc8"/>
    <polygon points="0,130 -16,42 0,54 16,42" fill="#8fafc8"/>
    <polygon points="130,0 42,-16 54,0 42,16" fill="#8fafc8"/>
    <polygon points="-130,0 -42,-16 -54,0 -42,16" fill="#8fafc8"/>
    <polygon points="92,-92 32,-22 38,-32" fill="#8fafc8"/>
    <polygon points="-92,-92 -32,-22 -38,-32" fill="#8fafc8"/>
    <polygon points="92,92 32,22 38,32" fill="#8fafc8"/>
    <polygon points="-92,92 -32,22 -38,32" fill="#8fafc8"/>
  </g>
  <!-- Blue arrow (moonlit glow) -->
  <g transform="translate(256,256)" filter="url(#glow)">
    <polygon points="44,-220 110,-130 66,-108 88,-64 22,-142 44,-120" fill="url(#arrowGrad)"/>
    <polygon points="22,-142 88,-64 44,-22" fill="#3a8ac4"/>
  </g>
</svg>
