<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="moonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8c4e0"/>
      <stop offset="100%" style="stop-color:#6b9fd4"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8e0"/>
      <stop offset="100%" style="stop-color:#4a9bd9"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Moonlit background circle -->
  <circle cx="256" cy="280" r="160" stroke="url(#moonGlow)" stroke-width="35" fill="none" filter="url(#glow)" opacity="0.7"/>
  <!-- Compass rose - 8 points (silver/moonlit) -->
  <g transform="translate(256,280)">
    <polygon points="0,-120 -15,-40 0,-50 15,-40" fill="#8fafc8"/>
    <polygon points="0,120 -15,40 0,50 15,40" fill="#8fafc8"/>
    <polygon points="120,0 40,-15 50,0 40,15" fill="#8fafc8"/>
    <polygon points="-120,0 -40,-15 -50,0 -40,15" fill="#8fafc8"/>
    <polygon points="85,-85 30,-20 35,-30" fill="#8fafc8"/>
    <polygon points="-85,-85 -30,-20 -35,-30" fill="#8fafc8"/>
    <polygon points="85,85 30,20 35,30" fill="#8fafc8"/>
    <polygon points="-85,85 -30,20 -35,30" fill="#8fafc8"/>
  </g>
  <!-- Blue arrow (moonlit glow) -->
  <g transform="translate(256,280)" filter="url(#glow)">
    <polygon points="40,-200 100,-120 60,-100 80,-60 20,-130 40,-110" fill="url(#arrowGrad)"/>
    <polygon points="20,-130 80,-60 40,-20" fill="#3a8ac4"/>
  </g>
</svg>
