services:
  app:
    build: .
    container_name: marshrutizator
    networks:
      - coolify
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    tmpfs:
      - /tmp:noexec,nosuid,size=128m
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - TZ=${TZ:-UTC}
      - LOG_LEVEL=info
      - DEFAULT_LANGUAGE=ru
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - FORCE_HTTPS=true
      - COOKIE_SECURE=true
      - TRUST_PROXY=1
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    labels:
      - traefik.enable=true
      - traefik.http.routers.marshrutizator.rule=Host(`marshrutizator.su`)
      - traefik.http.routers.marshrutizator.entrypoints=https
      - traefik.http.routers.marshrutizator.tls.certresolver=letsencrypt
      - traefik.http.routers.marshrutizator-http.rule=Host(`marshrutizator.su`)
      - traefik.http.routers.marshrutizator-http.entrypoints=http
      - traefik.http.routers.marshrutizator-http.middlewares=redirect-https
      - traefik.http.services.marshrutizator.loadbalancer.server.port=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  coolify:
    external: true
